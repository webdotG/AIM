openapi: 3.1.0
info:
  title: AIM Backend API
  description: "Life Graph -- psychological profile through graph analysis. All endpoints return {success, data} envelope. Auth via Bearer JWT. Soft delete only. Graph: 16 node types, 16 edge types."
  version: 1.0.0
servers:
  - url: http://localhost:3003
tags:
  - name: System
    description: Health check
  - name: Auth
    description: Authentication & registration
  - name: Graph
    description: Graph nodes, edges, traversal
  - name: Dreams
    description: Dream journal entries
  - name: Thoughts
    description: Thought entries
  - name: Memories
    description: Memory entries
  - name: Plans
    description: Plan/task entries
  - name: Actions
    description: Action/activity tracking
  - name: People
    description: People/contacts management
  - name: Emotions
    description: Berkeley emotion model (26 emotions)
  - name: Tags
    description: User-defined tagging
  - name: Measurements
    description: Node measurements
  - name: AI
    description: AI analysis and image generation
  - name: Analytics
    description: Statistics and analytics
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags:
        - System
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'OK'
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string

  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
                - hcaptchaToken
              properties:
                login:
                  type: string
                  minLength: 3
                  maxLength: 50
                password:
                  type: string
                  minLength: 12
                  maxLength: 128
                hcaptchaToken:
                  type: string
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
                      backupCode:
                        type: string
                      message:
                        type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
                - hcaptchaToken
              properties:
                login:
                  type: string
                password:
                  type: string
                hcaptchaToken:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/recover:
    post:
      tags:
        - Auth
      summary: Recover account with backup code
      operationId: recover
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - backup_code
                - new_password
                - hcaptchaToken
              properties:
                backup_code:
                  type: string
                new_password:
                  type: string
                  minLength: 12
                  maxLength: 128
                hcaptchaToken:
                  type: string
      responses:
        '200':
          description: Password recovered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      backup_code:
                        type: string
                      message:
                        type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/verify:
    get:
      tags:
        - Auth
      summary: Verify current user
      operationId: verify
      security: []
      responses:
        '200':
          description: User verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/check-password-strength:
    post:
      tags:
        - Auth
      summary: Check password strength
      operationId: checkPasswordStrength
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Password strength evaluated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      isStrong:
                        type: boolean
                      score:
                        type: integer
                      reasons:
                        type: array
                        items:
                          type: string
                      suggestions:
                        type: array
                        items:
                          type: string

  /api/v1/auth/generate-password:
    post:
      tags:
        - Auth
      summary: Generate a strong password
      operationId: generatePassword
      security: []
      responses:
        '200':
          description: Generated password
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      password:
                        type: string
  /api/v1/graph/node-types:
    get:
      tags:
        - Graph
      summary: Get all node types
      operationId: getNodeTypes
      security: []
      responses:
        '200':
          description: List of node types
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NodeType'

  /api/v1/graph/edge-types:
    get:
      tags:
        - Graph
      summary: Get all edge types
      operationId: getEdgeTypes
      security: []
      responses:
        '200':
          description: List of edge types
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EdgeType'

  /api/v1/graph/nodes:
    get:
      tags:
        - Graph
      summary: List nodes
      operationId: getNodes
      parameters:
        - name: node_type_code
          in: query
          schema:
            $ref: '#/components/schemas/NodeTypeCode'
        - name: search
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags:
        - Graph
      summary: Create a new node
      operationId: createNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - node_type_code
              properties:
                node_type_code:
                  $ref: '#/components/schemas/NodeTypeCode'
                title:
                  type: string
                  maxLength: 300
                  nullable: true
      responses:
        '201':
          description: Node created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Node'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/graph/nodes/{id}:
    get:
      tags:
        - Graph
      summary: Get a node by ID
      operationId: getNode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Node details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Node'
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Graph
      summary: Update a node
      operationId: updateNode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 300
                  nullable: true
      responses:
        '200':
          description: Node updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Node'
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Graph
      summary: Soft delete a node
      operationId: deleteNode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Node deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/graph/edges:
    post:
      tags:
        - Graph
      summary: Create a new edge
      operationId: createEdge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from_node_id
                - to_node_id
                - edge_type_code
              properties:
                from_node_id:
                  type: string
                  format: uuid
                to_node_id:
                  type: string
                  format: uuid
                edge_type_code:
                  type: string
                confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                  nullable: true
                weight:
                  type: number
                  minimum: 0
                  nullable: true
                notes:
                  type: string
                  maxLength: 1000
                  nullable: true
      responses:
        '201':
          description: Edge created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Edge'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/graph/edges/node/{nodeId}:
    get:
      tags:
        - Graph
      summary: Get edges connected to a node
      operationId: getEdgesByNode
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: direction
          in: query
          schema:
            type: string
            enum:
              - outgoing
              - incoming
              - both
            default: both
      responses:
        '200':
          description: Paginated list of edges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  /api/v1/graph/edges/{id}:
    delete:
      tags:
        - Graph
      summary: Delete an edge
      operationId: deleteEdge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Edge deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '404':
          description: Edge not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/graph/traversal/{nodeId}:
    get:
      tags:
        - Graph
      summary: Traverse graph from a node
      operationId: traverseGraph
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: direction
          in: query
          schema:
            type: string
            enum:
              - forward
              - backward
              - both
        - name: depth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
        - name: filterNodeType
          in: query
          schema:
            $ref: '#/components/schemas/NodeTypeCode'
        - name: filterEdgeType
          in: query
          schema:
            type: string
        - name: minConfidence
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
      responses:
        '200':
          description: Graph traversal result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      path:
                        type: array
                        items:
                          type: object
                      edges:
                        type: array
                        items:
                          type: object

  /api/v1/graph/neighbors/{nodeId}:
    get:
      tags:
        - Graph
      summary: Get neighbor nodes
      operationId: getNeighbors
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of neighbors
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        node_id:
                          type: string
                          format: uuid
                        node_type_code:
                          type: string
                        node_title:
                          type: string
                        link_count:
                          type: integer

  /api/v1/graph/graph-data:
    get:
      tags:
        - Graph
      summary: Get all graph data for visualization
      operationId: getGraphData
      responses:
        '200':
          description: Full graph data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      nodes:
                        type: array
                        items:
                          type: object
                      edges:
                        type: array
                        items:
                          type: object

  /api/v1/graph/most-connected:
    get:
      tags:
        - Graph
      summary: Get most connected nodes
      operationId: getMostConnected
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Most connected nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
  /api/v1/dreams:
    get:
      tags:
        - Dream
      summary: List dreams
      operationId: getDreams
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: nightmare
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of dreams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags:
        - Dream
      summary: Create a dream entry
      operationId: createDream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                title:
                  type: string
                  nullable: true
                content:
                  type: string
                dream_date:
                  type: string
                  format: date-time
                  nullable: true
                lucidity:
                  type: integer
                  minimum: 1
                  maximum: 10
                  nullable: true
                vividness:
                  type: integer
                  minimum: 1
                  maximum: 10
                  nullable: true
                nightmare:
                  type: boolean
                  default: False
                sleep_start:
                  type: string
                  format: date-time
                  nullable: true
                sleep_end:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '201':
          description: Dream created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      node:
                        $ref: '#/components/schemas/Node'
                      dream:
                        type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/dreams/{id}:
    get:
      tags:
        - Dream
      summary: Get a dream by ID
      operationId: getDream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dream details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      node:
                        $ref: '#/components/schemas/Node'
                      dream:
                        type: object
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Dream
      summary: Update a dream
      operationId: updateDream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  nullable: true
                content:
                  type: string
                  nullable: true
                dream_date:
                  type: string
                  format: date-time
                  nullable: true
                lucidity:
                  type: integer
                  minimum: 1
                  maximum: 10
                  nullable: true
                vividness:
                  type: integer
                  minimum: 1
                  maximum: 10
                  nullable: true
                nightmare:
                  type: boolean
                  nullable: true
                sleep_start:
                  type: string
                  format: date-time
                  nullable: true
                sleep_end:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '200':
          description: Dream updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      node:
                        $ref: '#/components/schemas/Node'
                      dream:
                        type: object
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Dream
      summary: Soft delete a dream
      operationId: deleteDream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dream deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/thoughts:
    get:
      tags:
        - Thought
      summary: List thoughts
      operationId: getThoughts
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of thoughts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags:
        - Thought
      summary: Create a thought entry
      operationId: createThought
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                title:
                  type: string
                  nullable: true
                content:
                  type: string
                importance:
                  type: integer
                  minimum: 1
                  maximum: 10
                  nullable: true
                confidence:
                  type: integer
                  minimum: 1
                  maximum: 10
                  nullable: true
      responses:
        '201':
          description: Thought created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      node:
                        $ref: '#/components/schemas/Node'
                      thought:
                        type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/thoughts/{id}:
    get:
      tags:
        - Thought
      summary: Get a thought by ID
      operationId: getThought
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thought details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      node:
                        $ref: '#/components/schemas/Node'
                      thought:
                        type: object
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Thought
      summary: Update a thought
      operationId: updateThought
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  nullable: true
                content:
                  type: string
                  nullable: true
                importance:
                  type: integer
                  minimum: 1
                  maximum: 10
                  nullable: true
                confidence:
                  type: integer
                  minimum: 1
                  maximum: 10
                  nullable: true
      responses:
        '200':
          description: Thought updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      node:
                        $ref: '#/components/schemas/Node'
                      thought:
