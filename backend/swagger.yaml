components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        details:
          type: array
          items:
            type: object

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            data:
              type: array
              items:
                type: object
            pagination:
              type: object
              properties:
                page:
                  type: integer
                limit:
                  type: integer
                total:
                  type: integer
                totalPages:
                  type: integer

    User:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string

    Node:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: integer
        node_type_id:
          type: integer
        node_type_code:
          type: string
        node_type_name:
          type: string
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    Edge:
      type: object
      properties:
        id:
          type: integer
        from_node_id:
          type: string
          format: uuid
        to_node_id:
          type: string
          format: uuid
        edge_type_id:
          type: integer
        edge_type_code:
          type: string
        edge_type_name:
          type: string
        confidence:
          type: number
          nullable: true
        weight:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true

    NodeType:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true

    EdgeType:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true

    NodeTypeCode:
      type: string
      enum: [dream, thought, memory, plan, action, person, place, book, project, conversation, movie, course, website, music, article]

    Emotion:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name_ru:
          type: string
        name_en:
          type: string
        category:
          type: string
          enum: [positive, negative, neutral]

    NodeEmotion:
      type: object
      properties:
        id:
          type: integer
        node_id:
          type: string
          format: uuid
        emotion_id:
          type: integer
        intensity:
          type: integer
          minimum: 1
          maximum: 10
        created_at:
          type: string
          format: date-time

    Tag:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string

    NodeMeasurement:
      type: object
      properties:
        id:
          type: integer
        node_id:
          type: string
          format: uuid
        measurement_id:
          type: integer
        value_integer:
          type: integer
          nullable: true
        value_decimal:
          type: number
          nullable: true
        value_boolean:
          type: boolean
          nullable: true
        value_text:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        measured_at:
          type: string
          format: date-time

    AIAnalysis:
      type: object
      properties:
        id:
          type: integer
        node_id:
          type: string
          format: uuid
        analysis_type:
          type: string
        ai_model:
          type: string
          nullable: true
        prompt:
          type: string
          nullable: true
        result:
          type: string
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time

    AIImage:
      type: object
      properties:
        id:
          type: integer
        node_id:
          type: string
          format: uuid
        image_url:
          type: string
        prompt:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        ai_model:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time